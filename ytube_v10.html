<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#FF0000"/>
<title>YTube v10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#FF0000;--dark:#0F0F0F;--card:#1A1A1A;--sur:#242424;--text:#F1F1F1;--sub:#AAAAAA;--bor:#333;--blue:#3EA6FF}
html{font-size:16px}
body{font-family:Roboto,Arial,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;background:var(--dark);border-bottom:1px solid var(--bor);padding:10px 12px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.lbox{background:var(--red);border-radius:8px;width:38px;height:28px;display:flex;align-items:center;justify-content:center}
.lbox svg{width:22px;height:22px;fill:#fff}
.ltxt{font-size:19px;font-weight:700;color:var(--text)}
.sw{flex:1;display:flex;min-width:0}
.sw input{flex:1;min-width:0;padding:10px 14px;background:var(--sur);border:1.5px solid var(--bor);border-right:none;border-radius:24px 0 0 24px;color:var(--text);font-size:15px;outline:none}
.sw input:focus{border-color:var(--blue)}
.sw button{padding:10px 16px;background:var(--sur);border:1.5px solid var(--bor);border-left:none;border-radius:0 24px 24px 0;color:var(--text);font-size:17px;cursor:pointer;flex-shrink:0}
.api-badge{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--sur);border-radius:20px;font-size:11px;color:#43A047;cursor:pointer;border:1px solid #43A047;flex-shrink:0;font-weight:600}
.api-badge .dot{width:7px;height:7px;border-radius:50%;background:#43A047;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.cats{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bor)}
.cats::-webkit-scrollbar{display:none}
.cat{padding:8px 16px;border-radius:24px;border:none;background:var(--sur);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;transition:background .2s;flex-shrink:0}
.cat.active{background:var(--text);color:var(--dark)}
.main{padding-bottom:72px;width:100%;overflow-x:hidden}
.stitle{padding:12px 14px 4px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.stitle .count{font-size:12px;color:var(--sub);font-weight:400}
.grid{display:block;width:100%}
.vc{display:block;width:100%;padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04)}
.vc:active{background:var(--card)}
.thb{position:relative;width:100%;padding-top:56.25%;border-radius:10px;overflow:hidden;background:var(--sur);margin-bottom:9px}
.thb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.dur{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.88);color:#fff;font-size:11px;padding:3px 6px;border-radius:4px;font-weight:600;z-index:1}
.pov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;background:rgba(0,0,0,.3)}
.pic{width:48px;height:48px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
.pic svg{width:24px;height:24px;fill:#fff;margin-left:4px}
.cm{display:flex;gap:10px;align-items:flex-start}
.av{width:38px;height:38px;border-radius:50%;background:var(--red);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.ci{flex:1;min-width:0}
.cti{font-size:14px;font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.cch{font-size:12px;color:var(--sub);margin-bottom:2px}
.cst{font-size:12px;color:var(--sub)}

/* PLAYER */
.player{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(100%);transition:transform .25s ease,opacity .25s ease}
.player.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.phdr{padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--dark);flex-shrink:0;border-bottom:1px solid var(--bor)}
.back{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px;border-radius:50%;line-height:1}
.ptitle{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vwrap{position:relative;width:100%;padding-top:56.25%;background:#000;flex-shrink:0;overflow:hidden}
.vwrap>*{position:absolute;top:0;left:0;width:100%;height:100%}
#vThumb{object-fit:cover;display:block;z-index:1;transition:opacity .3s}
#vThumb.hidden{opacity:0;pointer-events:none}
#pf{border:none;display:block;z-index:2;opacity:0;pointer-events:none;background:#000}
#pf.playing{opacity:1;pointer-events:auto}
.vplay-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:3;cursor:pointer;transition:opacity .2s}
.vplay-overlay.hidden{opacity:0;pointer-events:none}
.vplay-btn{width:68px;height:68px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.vplay-btn svg{width:32px;height:32px;fill:#fff;margin-left:5px}
.vplay-title{color:#fff;font-size:12px;text-align:center;padding:0 20px;line-height:1.4;max-width:300px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vfallback{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;z-index:4;gap:10px;text-align:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.vfallback.show{opacity:1;pointer-events:auto}
.vfallback p{color:#aaa;font-size:13px}
.vfallback-btn{padding:11px 26px;background:var(--red);border:none;border-radius:24px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.vinfo{padding:14px;flex:1;overflow-y:auto;overflow-x:hidden;background:var(--dark);min-height:0;-webkit-overflow-scrolling:touch}
.vinfo h2{font-size:15px;font-weight:600;line-height:1.45;margin-bottom:8px}
.vmeta{color:var(--sub);font-size:12px;margin-bottom:10px}
.arow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ab{display:flex;align-items:center;gap:5px;padding:9px 16px;border-radius:24px;border:none;background:var(--sur);color:var(--text);font-size:13px;cursor:pointer}
.ab:active{background:#444}
.ab.red{background:var(--red)}
.related-section{margin-top:12px}
.related-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--sub)}
#relatedVideos{min-height:60px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--sub)}
.spin{width:40px;height:40px;border:3px solid var(--sur);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{text-align:center;padding:40px 20px;color:var(--sub)}
.err .big{font-size:50px;margin-bottom:10px}
.err h3{font-size:18px;color:var(--text);margin-bottom:6px}
.err p{font-size:13px;line-height:1.6;max-width:300px;margin:0 auto}
.rbtn{margin-top:14px;padding:12px 26px;background:var(--red);border:none;border-radius:24px;color:#fff;font-size:14px;cursor:pointer}
.load-more-wrap{text-align:center;padding:18px}
.load-more-btn{padding:12px 28px;background:var(--sur);border:1px solid var(--bor);border-radius:24px;color:var(--text);font-size:14px;cursor:pointer}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--bor);display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;cursor:pointer;color:var(--sub);font-size:10px;gap:3px;border:none;background:none;transition:color .15s}
.ni.active{color:var(--text)}
.ni svg{width:24px;height:24px}

/* SHORTS */
.shorts-page{display:none;position:fixed;inset:0;z-index:150;background:#000;flex-direction:column}
.shorts-page.open{display:flex}
.shorts-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.7);position:absolute;top:0;left:0;right:0;z-index:10}
.shorts-feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;height:100%}
.shorts-feed::-webkit-scrollbar{display:none}
.short-item{width:100%;height:100vh;scroll-snap-align:start;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.short-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
.short-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);z-index:3;cursor:pointer;transition:opacity .2s}
.short-play-overlay.hidden{opacity:0;pointer-events:none}
.short-play-btn{width:60px;height:60px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center}
.short-play-btn svg{width:28px;height:28px;fill:#fff;margin-left:4px}
.short-iframe-wrap{position:absolute;inset:0;z-index:2;opacity:0;pointer-events:none;transition:opacity .3s}
.short-iframe-wrap.active{opacity:1;pointer-events:auto}
.short-iframe-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.short-overlay{position:absolute;bottom:70px;left:12px;right:12px;z-index:5;pointer-events:none}
.short-title{color:#fff;font-size:13px;font-weight:500;line-height:1.4;text-shadow:0 1px 4px rgba(0,0,0,.9);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.short-ch{color:rgba(255,255,255,.85);font-size:12px;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.short-yt-btn{position:absolute;bottom:14px;right:12px;z-index:5;padding:8px 16px;background:var(--red);border:none;border-radius:24px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.short-loading{color:#fff;font-size:14px;text-align:center;padding:40px;display:flex;flex-direction:column;align-items:center;gap:10px}

/* SUBSCRIBERS */
.subs-page{display:none;position:fixed;inset:0;z-index:150;background:var(--dark);flex-direction:column}
.subs-page.open{display:flex}
.subs-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;background:var(--dark);border-bottom:1px solid var(--bor)}
.subs-list{flex:1;overflow-y:auto;padding:8px 0}
.sub-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer}
.sub-item:active{background:var(--card)}
.sub-av{width:50px;height:50px;border-radius:50%;background:var(--red);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:14px;font-weight:600;margin-bottom:2px}
.sub-meta{font-size:12px;color:var(--sub)}
.sub-btn{padding:8px 16px;border-radius:24px;border:none;background:var(--text);color:var(--dark);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.sub-btn.subbed{background:var(--sur);color:var(--text)}
.subs-empty{text-align:center;padding:60px 20px;color:var(--sub)}
.subs-empty .big{font-size:52px;margin-bottom:12px}
.subs-empty h3{font-size:17px;color:var(--text);margin-bottom:7px}
.subs-empty p{font-size:13px;line-height:1.6}

/* INFO */
.info-panel{padding:18px 14px}
.info-box{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--bor);margin-bottom:14px}
.info-box h2{font-size:18px;margin-bottom:10px}
.info-box p{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:12px}
.info-note{background:var(--sur);border-radius:10px;padding:12px;font-size:12px;color:var(--sub);line-height:1.8;margin-top:10px}
.info-note strong{color:var(--text)}
.info-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
.v10-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:linear-gradient(135deg,#FF0000,#FF6B35);border-radius:12px;font-size:11px;font-weight:700;color:#fff;margin-left:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.12);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="lbox"><svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg></div>
    <span class="ltxt">YTube</span>
  </div>
  <div class="sw">
    <input type="text" id="si" placeholder="Videos search karein..." onkeydown="if(event.key==='Enter')doSearch()"/>
    <button onclick="doSearch()">🔍</button>
  </div>
  <div class="api-badge" onclick="showInfo()">
    <span class="dot"></span><span>v10</span>
  </div>
</div>

<div class="cats" id="cats">
  <button class="cat active" data-type="trending" data-label="🔥 Trending" onclick="loadCat(this)">🔥 Trending</button>
  <button class="cat" data-type="search" data-q="hindi songs 2025" data-label="🎵 Music" onclick="loadCat(this)">🎵 Music</button>

  <button class="cat" data-type="search" data-q="technology gadgets india" data-label="💻 Tech" onclick="loadCat(this)">💻 Tech</button>
  <button class="cat" data-type="search" data-q="bollywood songs 2025" data-label="🎬 Bollywood" onclick="loadCat(this)">🎬 Bollywood</button>
  <button class="cat" data-type="search" data-q="education tutorial hindi" data-label="📚 Education" onclick="loadCat(this)">📚 Education</button>
  <button class="cat" data-type="search" data-q="funny comedy india hindi" data-label="😂 Comedy" onclick="loadCat(this)">😂 Comedy</button>
</div>

<div class="main" id="main"></div>

<div class="player" id="player">
  <div class="phdr">
    <button class="back" onclick="closePlayer()">&#8592;</button>
    <span class="ptitle" id="pt"></span>
  </div>
  <div class="vwrap" id="vwrap">
    <img id="vThumb" src="" alt="" style="z-index:1;object-fit:cover;"/>

      referrerpolicy="no-referrer"
      sandbox="allow-scripts allow-same-origin allow-presentation allow-popups allow-forms"
      style="z-index:2;background:#000;"
    ></iframe>
    <div class="vplay-overlay" id="vOverlay" onclick="startPlay()">
      <div class="vplay-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="vplay-title" id="vOverlayTitle"></div>
    </div>
    <div class="vfallback" id="vFallback">
      <p>⚠️ Yahaan play nahi ho raha</p>
      <button class="vfallback-btn" onclick="openYT()">▶ YouTube par Dekhein</button>
    </div>

  <div class="vinfo" id="vinfo">

    <div class="related-section">
      <div class="related-label">🎬 Aur Videos</div>
      <div id="relatedVideos"><div class="loading"><div class="spin"></div></div></div>
    </div>
  </div>
</div>

<div class="bnav">
  <button class="ni active" id="navHome" onclick="goHome(this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </button>
  <button class="ni" id="navShorts" onclick="openShorts(this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.77 10.32l-1.2-.5L18 9.06a4 4 0 00-5.41-5.41l-.76 1.43-.5-1.2A4 4 0 006 8a4.19 4.19 0 00.07.68L4 10.05A4 4 0 004.05 16l1.29-.48-.48 1.29A4 4 0 0010 21.95l1.43-.76-.5 1.2A4 4 0 0016 18a4.19 4.19 0 00-.07-.68L18 15.95A4 4 0 0017.77 10.32zM13 17.5l-4-2.5V9l4 2.5V17.5z"/></svg>Shorts
  </button>
  <button class="ni" id="navSubs" onclick="openSubscribers(this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-6 2c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H8v-1c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1z"/></svg>Subscribers
  </button>
  <button class="ni" id="navSettings" onclick="showSettings(this)">

  </button>
</div>

<div class="shorts-page" id="shortsPage">
  <div class="shorts-hdr">
    <button class="back" onclick="closeShorts()" style="color:#fff">&#8592;</button>
    <span style="color:#fff;font-size:15px;font-weight:700">⚡ Shorts</span>
  </div>
  <div class="shorts-feed" id="shortsFeed">
    <div class="short-loading"><div class="spin"></div>Loading...</div>
  </div>
</div>

<div class="subs-page" id="subsPage">
  <div class="subs-hdr">
    <button class="back" onclick="closeSubscribers()">&#8592;</button>
    <span style="font-size:15px;font-weight:700">👥 Subscribers</span>
  </div>
  <div class="subs-list" id="subsList"></div>
</div>

<div class="toast" id="toast"></div>

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function thumb(id){return 'https://i.ytimg.com/vi/'+id+'/mqdefault.jpg';}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function fmtViews(n){
  n=parseInt(n)||0;
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return (n/1e3).toFixed(0)+'K';
  return n?String(n):'';
}
function fmtSec(s){
  s=parseInt(s)||0;
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  return m+':'+String(sec).padStart(2,'0');
}
function fmtAgo(ms){
  if(!ms)return '';
  var d=Math.floor((Date.now()-ms)/86400000);
  if(d<0)return '';if(d===0)return 'Aaj';if(d===1)return 'Kal';
  if(d<7)return d+' din pehle';if(d<30)return Math.floor(d/7)+' hafte pehle';
  if(d<365)return Math.floor(d/30)+' mahine pehle';return Math.floor(d/365)+' saal pehle';
}
function getText(obj){
  if(!obj)return '';
  if(typeof obj==='string')return obj;
  if(obj.simpleText)return obj.simpleText;
  if(obj.runs&&obj.runs.length)return obj.runs.map(function(r){return r.text||'';}).join('');
  return '';
}

// ══════════════════════════════════════════════════
// DATA LAYER — Claude AI (Anthropic API)
// Claude fetches YouTube video info server-side.
// No CORS issues — works from any local HTML file!
// ══════════════════════════════════════════════════

async function claudeFetch(prompt) {
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if(!r.ok) throw new Error('Claude API error ' + r.status);
  var data = await r.json();
  var text = (data.content||[]).map(function(b){return b.text||'';}).join('');
  // Strip markdown fences if present
  text = text.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(text);
}

function buildPrompt(type, query) {
  var base = 'Return ONLY a JSON array (no markdown, no explanation) of exactly 15 YouTube video objects. Each object must have these exact keys: id (11-char YouTube video ID), title, ch (channel name), views (e.g. "1.2M"), dur (e.g. "4:32"), ago (e.g. "2 saal pehle"). Use real popular YouTube videos that actually exist.';
  if(type === 'trending') {
    return base + ' Videos should be currently trending in India — mix of Hindi songs, Bollywood, cricket, comedy, news. Respond in this format only: [{"id":"...","title":"...","ch":"...","views":"...","dur":"...","ago":"..."},...]';
  } else {
    return base + ' Videos should match this search query: "' + query + '". Focus on Indian/Hindi content where relevant. Respond in this format only: [{"id":"...","title":"...","ch":"...","views":"...","dur":"...","ago":"..."},...]';
  }
}

async function searchInnertube(query) {
  var arr = await claudeFetch(buildPrompt('search', query));
  if(!Array.isArray(arr) || arr.length < 2) throw new Error('Bad response');
  return arr.map(function(v){
    return {id:v.id||'',title:v.title||'',ch:v.ch||'',views:v.views||'',dur:v.dur||'',ago:v.ago||'',thumb:thumb(v.id||'')};
  }).filter(function(v){return v.id && v.id.length===11;});
}

async function fetchTrendingInnertube() {
  var arr = await claudeFetch(buildPrompt('trending', ''));
  if(!Array.isArray(arr) || arr.length < 2) throw new Error('Bad response');
  return arr.map(function(v){
    return {id:v.id||'',title:v.title||'',ch:v.ch||'',views:v.views||'',dur:v.dur||'',ago:v.ago||'',thumb:thumb(v.id||'')};
  }).filter(function(v){return v.id && v.id.length===11;});
}

async function loadCat(btn) {
  document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  curType = btn.dataset.type || 'search';
  curQ = btn.dataset.q || '';
  curLabel = btn.dataset.label || btn.textContent;
  await loadVideos(true);
}

async function loadVideos(reset) {
  if(isLoading)return;
  isLoading=true;
  if(reset) showLoading();
  try{
    var videos = [];
    if(curType === 'trending') {
      try{videos = await fetchTrendingInnertube();}catch(e){console.log('Trending IT failed:',e);}
      if(!videos || videos.length < 3) {
        try{videos = await searchInnertube('trending india viral 2025');}catch(e2){console.log('Trending search failed:',e2);}
      }
    } else {
      try{videos = await searchInnertube(curQ);}catch(e){console.log('Search IT failed:',e);}
    }
    if(!videos || videos.length < 2) {
      videos = getFallback();
      showToast('⚠️ Network error — fallback videos');
    } else {
      showToast('✅ Claude AI — '+videos.length+' videos');
    }
    renderVideos(videos);
  }catch(e){
    showError(e.message||'Load nahi hua');
  }finally{
    isLoading=false;
  }
}

function playById(el){
  var id=(el.dataset.id||'').trim();if(!id)return;
  play(id,el.dataset.title||'',el.dataset.ch||'',el.dataset.views||'',el.dataset.thumb||'');
}
function play(id,title,ch,views,thumbUrl){
  if(!id)return;
  _stopIframe();
  curVid=id;curVidTitle=title;curVidCh=ch;
  document.getElementById('pt').textContent=title;
  document.getElementById('pft').textContent=title;
  document.getElementById('pm').textContent=ch+(views?' • '+views+' views':'');
  var vt=document.getElementById('vThumb');
  vt.src=thumbUrl||thumb(id);vt.classList.remove('hidden');
  document.getElementById('vOverlayTitle').textContent=title;
  document.getElementById('vOverlay').classList.remove('hidden');
  document.getElementById('vFallback').classList.remove('show');
  document.getElementById('pf').classList.remove('playing');
  var isSub=subscribedChannels.find(function(c){return c.name===ch;});
  var sb=document.getElementById('subBtn');
  sb.textContent=isSub?'✓ Subscribed':'+ Subscribe';
  sb.style.background=isSub?'var(--sur)':'';
  document.getElementById('relatedVideos').innerHTML='<div class="loading"><div class="spin"></div></div>';
  document.getElementById('player').classList.add('open');
  document.body.style.overflow='hidden';
  playerOpen=true;
  try{history.pushState({p:1},'');}catch(e){}
  setTimeout(function(){var vi=document.getElementById('vinfo');if(vi)vi.scrollTop=0;},50);
  loadRelated(curQ||title);
}
function startPlay(){
  var id=curVid;if(!id)return;
  _clearFT();
  var pf=document.getElementById('pf');
  // Use youtube-nocookie.com for better embed compatibility
  pf.src='https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&playsinline=1&rel=0&fs=1&controls=1&modestbranding=1&iv_load_policy=3';
  pf.classList.add('playing');
  document.getElementById('vOverlay').classList.add('hidden');
  document.getElementById('vThumb').classList.add('hidden');
  fallbackTimer=setTimeout(function(){
    var failed=false;
    try{var doc=pf.contentDocument||(pf.contentWindow&&pf.contentWindow.document);if(doc&&(doc.title===''||!doc.body||doc.body.innerHTML===''))failed=true;}catch(e){failed=false;}
    if(failed)showFallback();
  },12000);
}
function _stopIframe(){_clearFT();var pf=document.getElementById('pf');pf.src='';pf.classList.remove('playing');}
function _clearFT(){if(fallbackTimer){clearTimeout(fallbackTimer);fallbackTimer=null;}}
function showFallback(){_clearFT();document.getElementById('pf').classList.remove('playing');document.getElementById('vThumb').classList.remove('hidden');document.getElementById('vOverlay').classList.add('hidden');document.getElementById('vFallback').classList.add('show');}
function closePlayer(){_stopIframe();document.getElementById('vThumb').classList.remove('hidden');document.getElementById('vThumb').src='';document.getElementById('vOverlay').classList.remove('hidden');document.getElementById('vFallback').classList.remove('show');document.getElementById('player').classList.remove('open');document.body.style.overflow='';playerOpen=false;}

function shareV(){var u='https://youtu.be/'+curVid;if(navigator.share)navigator.share({title:curVidTitle,url:u}).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(u).then(function(){showToast('Link copy ho gaya!');}).catch(function(){alert(u);});else alert(u);}
function toggleSub(){
  var ch=curVidCh;if(!ch)return;
  var idx=subscribedChannels.findIndex(function(c){return c.name===ch;});
  if(idx>=0){subscribedChannels.splice(idx,1);showToast('Unsubscribed: '+ch);}
  else{subscribe(ch);showToast('Subscribed: '+ch);}
  try{localStorage.setItem('yt_subs',JSON.stringify(subscribedChannels));}catch(e){}
  var isSub=subscribedChannels.find(function(c){return c.name===ch;});
