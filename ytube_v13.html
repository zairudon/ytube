<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTube</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none}
</style>
<script>
// Try to open YouTube app first, fallback to mobile site
window.location.replace('https://m.youtube.com');
</script>
</head>
<body>
<iframe
  src="https://m.youtube.com"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen
  referrerpolicy="no-referrer-when-downgrade"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation allow-top-navigation-by-user-activation"
></iframe>
</body>
</html>
