<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#FF0000"/>
<title>YTube</title>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="robots" content="noindex"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#FF0000;--dark:#0F0F0F;--card:#1A1A1A;--sur:#242424;--text:#F1F1F1;--sub:#AAAAAA;--bor:#333}
body{font-family:Roboto,Arial,sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

.topbar{position:sticky;top:0;z-index:100;background:var(--dark);border-bottom:1px solid var(--bor);padding:10px 12px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lbox{background:var(--red);border-radius:6px;width:36px;height:26px;display:flex;align-items:center;justify-content:center}
.lbox svg{width:20px;height:20px;fill:#fff}
.ltxt{font-size:18px;font-weight:700;color:var(--text)}
.sw{flex:1;display:flex}
.sw input{flex:1;padding:8px 12px;background:var(--sur);border:1px solid var(--bor);border-right:none;border-radius:20px 0 0 20px;color:var(--text);font-size:14px;outline:none}
.sw input:focus{border-color:#3EA6FF}
.sw button{padding:8px 14px;background:var(--sur);border:1px solid var(--bor);border-left:none;border-radius:0 20px 20px 0;color:var(--text);font-size:15px;cursor:pointer}

/* API Key Setup */
.api-setup{padding:20px;max-width:480px;margin:0 auto}
.api-box{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--bor)}
.api-box h2{font-size:18px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.api-box p{font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:14px}
.api-box a{color:#3EA6FF;text-decoration:none}
.api-input{width:100%;padding:10px 14px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.api-input:focus{border-color:#3EA6FF}
.api-btn{width:100%;padding:12px;background:var(--red);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.api-btn:hover{background:#cc0000}
.api-note{background:var(--sur);border-radius:8px;padding:12px;font-size:12px;color:var(--sub);line-height:1.7;margin-top:10px}
.api-note strong{color:var(--text)}

.cats{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bor)}
.cats::-webkit-scrollbar{display:none}
.cat{padding:6px 14px;border-radius:20px;border:none;background:var(--sur);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;transition:background .2s}
.cat.active,.cat:hover{background:var(--text);color:var(--dark)}

.main{padding-bottom:64px}
.stitle{padding:12px 12px 4px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.stitle .count{font-size:12px;color:var(--sub);font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

.vc{padding:10px 12px;cursor:pointer;transition:background .15s}
.vc:hover{background:var(--card)}
.thb{position:relative;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:var(--sur);margin-bottom:8px}
.thb img{width:100%;height:100%;object-fit:cover;display:block}
.dur{position:absolute;bottom:5px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 5px;border-radius:3px;font-weight:600}
.pov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s}
.vc:hover .pov{background:rgba(0,0,0,.3)}
.pic{width:46px;height:46px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.vc:hover .pic{opacity:1}
.pic svg{width:20px;height:20px;fill:#fff;margin-left:3px}
.cm{display:flex;gap:10px;align-items:flex-start}
.av{width:34px;height:34px;border-radius:50%;background:var(--red);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.ci{flex:1;min-width:0}
.cti{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.cch{font-size:12px;color:var(--sub);margin-bottom:1px}
.cst{font-size:12px;color:var(--sub)}

/* PLAYER */
.player{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;overflow:hidden}
.player.open{display:flex}
.phdr{padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--dark)}
.back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:50%}
.vwrap{width:100%;background:#000}
.vwrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.vinfo{padding:14px;flex:1;overflow-y:auto;background:var(--dark);min-height:0;height:0;-webkit-overflow-scrolling:touch}
.vinfo h2{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:8px}
.vmeta{color:var(--sub);font-size:12px;margin-bottom:10px}
.arow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ab{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:none;background:var(--sur);color:var(--text);font-size:13px;cursor:pointer}
.ab:hover{background:#444}
.ab.red{background:var(--red)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--sub)}
.spin{width:38px;height:38px;border:3px solid var(--sur);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{text-align:center;padding:40px 20px;color:var(--sub)}
.err .big{font-size:44px;margin-bottom:10px}
.err h3{font-size:17px;color:var(--text);margin-bottom:6px}
.err p{font-size:13px;line-height:1.6}
.rbtn{margin-top:14px;padding:10px 24px;background:var(--red);border:none;border-radius:20px;color:#fff;font-size:14px;cursor:pointer}

/* Load More */
.load-more-wrap{text-align:center;padding:16px}
.load-more-btn{padding:10px 28px;background:var(--sur);border:1px solid var(--bor);border-radius:20px;color:var(--text);font-size:14px;cursor:pointer;transition:background .2s}
.load-more-btn:hover{background:var(--card)}

/* API Key badge */
.key-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--sur);border-radius:20px;font-size:11px;color:var(--sub);cursor:pointer;border:1px solid var(--bor);flex-shrink:0}
.key-badge .dot{width:7px;height:7px;border-radius:50%;background:#43A047}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--bor);display:flex;z-index:99}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;cursor:pointer;color:var(--sub);font-size:10px;gap:3px;border:none;background:none;transition:color .15s}
.ni.active,.ni:hover{color:var(--text)}
.ni svg{width:22px;height:22px}

/* SHORTS */
.shorts-page{display:none;position:fixed;inset:0;z-index:150;background:#000;flex-direction:column}
.shorts-page.open{display:flex}
.shorts-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.7);position:absolute;top:0;left:0;right:0;z-index:2}
.shorts-feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;height:100%}
.shorts-feed::-webkit-scrollbar{display:none}
.short-item{width:100%;height:100vh;scroll-snap-align:start;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
.short-item iframe{width:100%;height:100%;border:none;position:absolute;inset:0}
.short-overlay{position:absolute;bottom:70px;left:12px;right:12px;z-index:3;pointer-events:none}
.short-title{color:#fff;font-size:13px;font-weight:500;line-height:1.4;text-shadow:0 1px 4px rgba(0,0,0,.8);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.short-ch{color:rgba(255,255,255,.8);font-size:12px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.short-loading{color:#fff;font-size:14px;text-align:center;padding:40px}

/* SUBSCRIBERS */
.subs-page{display:none;position:fixed;inset:0;z-index:150;background:var(--dark);flex-direction:column}
.subs-page.open{display:flex}
.subs-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;background:var(--dark);border-bottom:1px solid var(--bor)}
.subs-list{flex:1;overflow-y:auto;padding:10px 0}
.sub-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.sub-item:hover{background:var(--card)}
.sub-av{width:48px;height:48px;border-radius:50%;background:var(--red);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:14px;font-weight:600;margin-bottom:2px}
.sub-meta{font-size:12px;color:var(--sub)}
.sub-btn{padding:7px 16px;border-radius:20px;border:none;background:var(--text);color:var(--dark);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.sub-btn.subbed{background:var(--sur);color:var(--text)}
.subs-empty{text-align:center;padding:60px 20px;color:var(--sub)}
.subs-empty .big{font-size:48px;margin-bottom:12px}
.subs-empty h3{font-size:16px;color:var(--text);margin-bottom:6px}
.subs-empty p{font-size:13px;line-height:1.6}
</style>
</head>

<script>
// ── STATE ──────────────────────────────────────────────────────
let curVid = '';
let curQ = 'trending viral India';
let nextPageToken = '';
let curLabel = '';
let isLoading = false;
let YT_API_KEY = localStorage.getItem('yt_api_key') || '';

// ── FORMAT HELPERS ─────────────────────────────────────────────
function fmtViews(n){
  if(!n) return '';
  n = parseInt(n);
  if(n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(0)+'K';
  return n+'';
}

function fmtDur(iso){
  if(!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return '';
  const h=parseInt(m[1]||0), mi=parseInt(m[2]||0), s=parseInt(m[3]||0);
  if(h>0) return `${h}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${mi}:${String(s).padStart(2,'0')}`;
}

function fmtAgo(dateStr){
  if(!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const d = Math.floor(diff/86400000);
  if(d===0) return 'Aaj';
  if(d===1) return 'Kal';
  if(d<7) return d+' din pehle';
  if(d<30) return Math.floor(d/7)+' hafte pehle';
  if(d<365) return Math.floor(d/30)+' mahine pehle';
  return Math.floor(d/365)+' saal pehle';
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── API KEY MANAGEMENT ─────────────────────────────────────────
function updateKeyBadge(){
  const dot = document.getElementById('keyDot');
  const lbl = document.getElementById('keyLabel');
  if(YT_API_KEY){
    dot.style.background = '#43A047';
    lbl.textContent = 'Connected';
  } else {
    dot.style.background = '#f44336';
    lbl.textContent = 'API Key';
  }
}

function showApiSetup(){
  document.getElementById('main').innerHTML = `
    <div class="api-setup">
      <div class="api-box">
        <h2>🔑 YouTube API Key</h2>
        <p>Real YouTube videos dekhne ke liye <strong>YouTube Data API v3</strong> key chahiye. Ye bilkul free hai!</p>
        
        <div class="api-note" style="margin-bottom:14px">
          <strong>📋 Key kaise banayein (2 minute):</strong><br>
          1. <a href="https://console.cloud.google.com/" target="_blank">console.cloud.google.com</a> kholein<br>
          2. New Project banayein<br>
          3. APIs & Services → Enable APIs → "YouTube Data API v3" enable karein<br>
          4. Credentials → Create Credentials → API Key<br>
          5. Woh key neeche paste karein ✅
        </div>
        
        <input type="text" class="api-input" id="keyInput" placeholder="AIza... (apni API key yahan paste karein)" value="${YT_API_KEY}"/>
        <button class="api-btn" onclick="saveApiKey()">✅ Save Karein & Shuru Karein</button>
        
        ${YT_API_KEY ? `<button class="api-btn" style="background:#333;margin-top:8px" onclick="clearApiKey()">🗑️ Key Hatao</button>` : ''}
        
        <div class="api-note" style="margin-top:12px">
          <strong>🔒 Security:</strong> Aapki key sirf aapke device mein save hoti hai.<br>
          <strong>📊 Free Limit:</strong> 10,000 requests/day — daily use ke liye kaafi hai.
        </div>
      </div>
    </div>`;
}

function saveApiKey(){
  const key = document.getElementById('keyInput').value.trim();
  if(!key){ alert('Key khaali hai!'); return; }
  YT_API_KEY = key;
  localStorage.setItem('yt_api_key', key);
  updateKeyBadge();
  // Load home
  const firstCat = document.querySelector('.cat');
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  firstCat.classList.add('active');
  loadVideos(firstCat.dataset.q, '', true);
}

function clearApiKey(){
  YT_API_KEY = '';
  localStorage.removeItem('yt_api_key');
  updateKeyBadge();
  showApiSetup();
}

// ── YOUTUBE API ────────────────────────────────────────────────
// Step 1: Search for video IDs
async function ytSearch(query, pageToken=''){
  const params = new URLSearchParams({
    part: 'snippet',
    q: query,
    type: 'video',
    maxResults: 12,
    relevanceLanguage: 'hi',
    regionCode: 'IN',
    key: YT_API_KEY,
    ...(pageToken ? {pageToken} : {})
  });
  const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
  if(!res.ok){
    const err = await res.json();
    throw new Error(err?.error?.message || 'API error');
  }
  return res.json();
}

// Step 2: Get video details (duration, views)
async function ytVideoDetails(ids){
  const params = new URLSearchParams({
    part: 'snippet,contentDetails,statistics',
    id: ids.join(','),
    key: YT_API_KEY
  });
  const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?${params}`);
  if(!res.ok) throw new Error('Details fetch failed');
  return res.json();
}

// Combined: search + details
async function fetchYouTubeVideos(query, pageToken=''){
  const searchData = await ytSearch(query, pageToken);
  const ids = searchData.items.map(i=>i.id.videoId).filter(Boolean);
  if(!ids.length) return { videos:[], nextPageToken:'' };

  const detailData = await ytVideoDetails(ids);
  const detailMap = {};
  detailData.items.forEach(v=>{
    detailMap[v.id] = v;
  });

  const videos = ids.map(id=>{
    const s = searchData.items.find(i=>i.id.videoId===id)?.snippet || {};
    const d = detailMap[id];
    return {
      id,
      title: s.title || '',
      ch: s.channelTitle || '',
      views: fmtViews(d?.statistics?.viewCount),
      dur: fmtDur(d?.contentDetails?.duration),
      thumb: s.thumbnails?.medium?.url || s.thumbnails?.default?.url || '',
      publishedAt: s.publishedAt
    };
  });

  return { videos, nextPageToken: searchData.nextPageToken || '' };
}

// ── LOAD CATEGORY ──────────────────────────────────────────────
async function loadCat(btn){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curQ = btn.dataset.q;
  await loadVideos(curQ, '', true);
}

async function loadVideos(q, label, reset=true){
  if(isLoading) return;
  
  if(!YT_API_KEY){
    showNoKey();
    return;
  }

  curQ = q;
  curLabel = label || q;

  if(reset){
    nextPageToken = '';
    showLoading();
  } else {
    showLoadingMore();
  }

  isLoading = true;

  try {
    const { videos, nextPageToken: npt } = await fetchYouTubeVideos(q, reset ? '' : nextPageToken);
    nextPageToken = npt;
    
    if(reset){
      renderVideos(videos, curLabel, videos.length);
    } else {
      appendVideos(videos);
      updateLoadMore();
    }
  } catch(e){
    showError(e.message);
  } finally {
    isLoading = false;
  }
}

async function doSearch(){
  const q = document.getElementById('si').value.trim();
  if(!q) return;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  await loadVideos(q, `🔍 "${q}"`, true);
}

// ── RENDER ─────────────────────────────────────────────────────
function videoCard(v){
  const thumb = esc(v.thumb || `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`);
  const t = esc(v.title||'');
  const ch = esc(v.ch||'');
  const meta = [v.views ? v.views+' views' : '', fmtAgo(v.publishedAt)].filter(Boolean).join(' • ');
  // Use JSON-safe raw values for data attributes (set via JS after insertion)
  const safeId = (v.id||'').replace(/"/g,'');
  return `
  <div class="vc" onclick="playById(this)"
    data-id="${safeId}"
    data-title="${t}"
    data-ch="${ch}"
    data-views="${esc(v.views||'')}">
    <div class="thb">
      <img src="${thumb}" alt="${t}" loading="lazy"
        onerror="this.src='https://i.ytimg.com/vi/${safeId}/hqdefault.jpg'"/>
      <div class="pov"><div class="pic"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      ${v.dur?`<span class="dur">${esc(v.dur)}</span>`:''}
    </div>
    <div class="cm">
      <div class="av">${(ch.charAt(0)||'Y').toUpperCase()}</div>
      <div class="ci">
        <div class="cti">${t}</div>
        <div class="cch">${ch}</div>
        <div class="cst">${esc(meta)}</div>
      </div>
    </div>
  </div>`;
}

function renderVideos(items, label, total){
  const grid = items.map(videoCard).join('');
  const loadMoreHtml = nextPageToken
    ? `<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">⬇️ Aur Videos</button></div>`
    : '';

  document.getElementById('main').innerHTML =
    `${label?`<div class="stitle"><span>${esc(label)}</span><span class="count">${total}+ results</span></div>`:''}
     <div class="grid" id="videoGrid">${grid}</div>
     <div id="loadMoreArea">${loadMoreHtml}</div>`;
}

function appendVideos(items){
  const grid = document.getElementById('videoGrid');
  if(grid) grid.insertAdjacentHTML('beforeend', items.map(videoCard).join(''));
}

function updateLoadMore(){
  const area = document.getElementById('loadMoreArea');
  if(area){
    area.innerHTML = nextPageToken
      ? `<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">⬇️ Aur Videos</button></div>`
      : '';
  }
}

function loadMore(){
  loadVideos(curQ, curLabel, false);
}

// ── PLAYER ─────────────────────────────────────────────────────
function playById(el){
  const id = (el.dataset.id||'').trim();
  const title = el.dataset.title || '';
  const ch = el.dataset.ch || '';
  const views = el.dataset.views || '';
  if(!id) return;
  play(id, title, ch, views);
}

function play(id, title, ch, views){
  curVid = id;
  document.getElementById('pt').textContent = title;
  document.getElementById('pft').textContent = title;
  document.getElementById('pm').textContent = `${ch}${views?' • '+views+' views':''}`;
  const pf = document.getElementById('pf');
  const fb = document.getElementById('ytFallback');
  const embedUrl = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&playsinline=1&enablejsapi=1&fs=1`;
  pf.src = embedUrl;
  pf.style.display = 'block';
  if(fb) fb.style.display = 'none';
  // Fallback: if iframe fails to load in 8s, show Watch on YouTube button
  if(window._ytFallbackTimer) clearTimeout(window._ytFallbackTimer);
  window._ytFallbackTimer = setTimeout(()=>{
    try {
      const doc = pf.contentDocument || pf.contentWindow?.document;
      if(!doc || doc.title === '' || doc.body?.innerHTML === '') {
        pf.style.display = 'none';
        if(fb){ fb.style.display = 'flex'; }
      }
    } catch(e) {
      // cross-origin — video likely loaded fine, do nothing
    }
  }, 8000);
  document.getElementById('player').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({p:true},'');
  loadRelated(title, ch);
}

async function loadRelated(title, ch){
  const el = document.getElementById('relatedVideos');
  el.innerHTML = '<div class="loading"><div class="spin"></div></div>';
  try {
    const q = ch || title.split(' ').slice(0,4).join(' ');
    const data = await fetchYouTubeVideos(q);
    const filtered = data.videos.filter(v => v.id !== curVid).slice(0, 8);
    if(!filtered.length){ el.innerHTML = ''; return; }
    const frag = document.createDocumentFragment();
    filtered.forEach(v => {
      const div = document.createElement('div');
      div.className = 'vc';
      div.dataset.id = v.id || '';
      div.dataset.title = v.title || '';
      div.dataset.ch = v.ch || '';
      div.dataset.views = v.views || '';
      div.onclick = function(){ playById(this); };
      const thumb = v.thumb || `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
      const t = esc(v.title||'');
      const c = esc(v.ch||'');
      div.innerHTML = `<div class="thb"><img src="${esc(thumb)}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${esc(v.id)}/hqdefault.jpg'"/>
        ${v.dur?`<span class="dur">${esc(v.dur)}</span>`:''}
        </div>
        <div class="cm"><div class="av">${(c.charAt(0)||'Y').toUpperCase()}</div>
        <div class="ci"><div class="cti">${t}</div><div class="cch">${c}</div><div class="cst">${esc(v.views||'')}</div></div></div>`;
      frag.appendChild(div);
    });
    el.innerHTML = '';
    el.appendChild(frag);
  } catch(e){ el.innerHTML = ''; }
}

function closePlayer(){
  document.getElementById('player').classList.remove('open');
  document.getElementById('pf').src = '';
  document.getElementById('pf').style.display = 'block';
  const fb = document.getElementById('ytFallback');
  if(fb) fb.style.display = 'none';
  if(window._ytFallbackTimer) clearTimeout(window._ytFallbackTimer);
  document.body.style.overflow = '';
}

function openYT(){ window.open(`https://www.youtube.com/watch?v=${curVid}`,'_blank'); }

function shareV(){
  const u = `https://youtu.be/${curVid}`;
  if(navigator.share) navigator.share({url:u});
  else { navigator.clipboard?.writeText(u); alert('Link copy ho gaya!'); }
}

window.addEventListener('popstate',()=>{
  if(document.getElementById('player').classList.contains('open')) closePlayer();
});

// ── STATES ─────────────────────────────────────────────────────
function showLoading(){
  document.getElementById('main').innerHTML =
    `<div class="loading"><div class="spin"></div><span>YouTube se videos laa rahe hain...</span></div>`;
}

function showLoadingMore(){
  const area = document.getElementById('loadMoreArea');
  if(area) area.innerHTML = `<div class="loading" style="padding:20px"><div class="spin"></div></div>`;
}

function showError(msg){
  const isQuota = (msg||'').toLowerCase().includes('quota');
  const isKey = (msg||'').toLowerCase().includes('api key') || (msg||'').toLowerCase().includes('invalid');
  document.getElementById('main').innerHTML = `
    <div class="err">
      <div class="big">${isQuota?'📊':isKey?'🔑':'⚠️'}</div>
      <h3>${isQuota?'Daily Limit Khatam':'Error'}</h3>
      <p style="max-width:300px;margin:0 auto">${isQuota?'Aaj ka free quota use ho gaya. Kal wapas aayein ya naya API key banayein.':isKey?'API Key galat hai. Settings mein check karein.':esc(msg)}</p>
      <button class="rbtn" onclick="showApiSetup()">🔑 Settings</button>
    </div>`;
}

function showNoKey(){
  document.getElementById('main').innerHTML = `
    <div class="err">
      <div class="big">🔑</div>
      <h3>API Key Chahiye</h3>
      <p style="max-width:300px;margin:0 auto">Real YouTube videos dekhne ke liye ek free API key add karein — sirf 2 minute lagenge!</p>
      <button class="rbtn" onclick="showApiSetup()">Key Add Karein →</button>
    </div>`;
}

// ── SHORTS ─────────────────────────────────────────────────────
let shortsLoaded = false;
let subscribedChannels = JSON.parse(localStorage.getItem('yt_subscribed') || '[]');

async function openShorts(el){
  setNav(el);
  document.getElementById('shortsPage').classList.add('open');
  document.body.style.overflow = 'hidden';
  if(!shortsLoaded) await loadShorts();
}

function closeShorts(){
  document.getElementById('shortsPage').classList.remove('open');
  document.body.style.overflow = '';
  // Pause all iframes
  document.querySelectorAll('#shortsFeed iframe').forEach(f=>{ f.src = f.src; });
  setNav(document.getElementById('navHome'));
}

async function loadShorts(){
  if(!YT_API_KEY){ 
    document.getElementById('shortsFeed').innerHTML = '<div class="short-loading">🔑 API Key chahiye shorts ke liye</div>';
    return;
  }
  document.getElementById('shortsFeed').innerHTML = '<div class="short-loading"><div class="spin" style="margin:0 auto 10px"></div>Shorts laa rahe hain...</div>';
  try {
    const params = new URLSearchParams({
      part:'snippet',q:'shorts viral India trending',type:'video',
      videoDuration:'short',maxResults:15,regionCode:'IN',key:YT_API_KEY
    });
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
    const data = await res.json();
    if(!data.items?.length){ document.getElementById('shortsFeed').innerHTML='<div class="short-loading">Koi shorts nahi mila</div>'; return; }
    const html = data.items.map(item=>{
      const id = item.id?.videoId || '';
      const title = esc(item.snippet?.title||'');
      const ch = esc(item.snippet?.channelTitle||'');
      if(!id) return '';
      return `<div class="short-item">
        <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=0&rel=0&loop=1&playlist=${id}&playsinline=1&fs=0"
          allow="autoplay;encrypted-media" allowfullscreen loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"></iframe>
        <div class="short-fb" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#111">
          <div style="color:#aaa;font-size:13px">⚠️ Short nahi chal raha</div>
          <a href="https://www.youtube.com/shorts/${id}" target="_blank" style="padding:9px 20px;background:#FF0000;border-radius:20px;color:#fff;font-size:13px;font-weight:600;text-decoration:none">▶ YouTube par Dekhein</a>
        </div>
        <div class="short-overlay">
          <div class="short-title">${title}</div>
          <div class="short-ch">@${ch}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('shortsFeed').innerHTML = html;
    shortsLoaded = true;
  } catch(e){
    document.getElementById('shortsFeed').innerHTML = `<div class="short-loading">Error: ${esc(e.message)}</div>`;
  }
}

// ── SUBSCRIBERS ────────────────────────────────────────────────
function openSubscribers(el){
  setNav(el);
  document.getElementById('subsPage').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderSubscribers();
}

function closeSubscribers(){
  document.getElementById('subsPage').classList.remove('open');
  document.body.style.overflow = '';
  setNav(document.getElementById('navHome'));
}

function renderSubscribers(){
  const list = document.getElementById('subsList');
  if(!subscribedChannels.length){
    list.innerHTML = `<div class="subs-empty"><div class="big">📺</div><h3>Koi Subscriber Nahi</h3><p>Videos dekhte waqt channels ko subscribe karein — yahan dikhenge!</p></div>`;
    return;
  }
  list.innerHTML = subscribedChannels.map((ch,i) => `
    <div class="sub-item" onclick="searchChannel('${esc(ch.name)}')">
      <div class="sub-av" style="background:${ch.color||'var(--red)'};">${(ch.name||'?').charAt(0).toUpperCase()}</div>
      <div class="sub-info">
        <div class="sub-name">${esc(ch.name)}</div>
        <div class="sub-meta">Subscribe kiya hua</div>
      </div>
      <button class="sub-btn subbed" onclick="event.stopPropagation();unsubscribe(${i})">✓ Subscribed</button>
    </div>`).join('');
}

function subscribe(chName){
  if(!chName) return;
  const colors = ['#E53935','#8E24AA','#1E88E5','#00897B','#F4511E','#6D4C41'];
  if(!subscribedChannels.find(c=>c.name===chName)){
    subscribedChannels.push({name:chName, color:colors[subscribedChannels.length%colors.length]});
    localStorage.setItem('yt_subscribed', JSON.stringify(subscribedChannels));
  }
}

function unsubscribe(idx){
  subscribedChannels.splice(idx,1);
  localStorage.setItem('yt_subscribed', JSON.stringify(subscribedChannels));
  renderSubscribers();
}

function searchChannel(name){
  closeSubscribers();
  document.getElementById('si').value = name;
  loadVideos(name, `📺 ${name}`, true);
}

// ── NAV ────────────────────────────────────────────────────────
function goHome(el){
  setNav(el);
  // Close any open pages
  document.getElementById('shortsPage').classList.remove('open');
  document.getElementById('subsPage').classList.remove('open');
  document.body.style.overflow = '';
  const firstCat = document.querySelector('.cat');
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  firstCat.classList.add('active');
  loadVideos(firstCat.dataset.q, '', true);
}

function focusSrch(el){ setNav(el); document.getElementById('si').focus(); }

function showSettings(el){
  setNav(el);
  // Close any open pages
  document.getElementById('shortsPage').classList.remove('open');
  document.getElementById('subsPage').classList.remove('open');
  document.body.style.overflow = '';
  showApiSetup();
}

function setNav(el){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
}

// ── START ──────────────────────────────────────────────────────
updateKeyBadge();
if(YT_API_KEY){
  loadVideos('trending viral India', '', true);
} else {
  showNoKey();
}
</script>
