name: Build YTube APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Android Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi

        cp ytube_v3.html app/src/main/assets/index.html

        cat > settings.gradle << 'EOF'
        include ':app'
        EOF

        cat > build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            compileSdk 34
            namespace "com.zairudon.ytube"
            defaultConfig {
                applicationId "com.zairudon.ytube"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    signingConfig signingConfigs.debug
                }
            }
        }
        EOF

        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:label="YTube"
                android:usesCleartextTraffic="true"
                android:theme="@style/AppTheme">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        mkdir -p app/src/main/java/com/zairudon/ytube
        cat > app/src/main/java/com/zairudon/ytube/MainActivity.java << 'EOF'
        package com.zairudon.ytube;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.*;
        import android.view.*;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                getWindow().requestFeature(Window.FEATURE_NO_TITLE);
                WebView wv = new WebView(this);
                wv.getSettings().setJavaScriptEnabled(true);
                wv.getSettings().setDomStorageEnabled(true);
                wv.getSettings().setMediaPlaybackRequiresUserGesture(false);
                wv.setWebChromeClient(new WebChromeClient());
                wv.loadUrl("file:///android_asset/index.html");
                setContentView(wv);
            }
        }
        EOF

        cat > app/src/main/res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen"/>
        </resources>
        EOF

    - name: Setup Gradle
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        EOF
        mkdir -p gradle/wrapper
        curl -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

    - name: Build APK
      run: chmod +x gradlew && ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YTube-APK
        path: app/build/outputs/apk/release/*.apk
